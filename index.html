<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title i>EduMailer</title>
    <link rel="stylesheet" href="project1.css">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

header {
    background-color: #333;
    color: #fff;
    padding: 10px 20px;
}

.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar h2 {
    font-size: 24px;
}

.navbar ul {
    list-style-type: none;
    display: flex;
}

.navbar ul li {
    margin-left: 20px;
}

.navbar ul li a {
    color: #fff;
    text-decoration: none;
}

.login-btn {
    background-color: #f4f4f4;
    color: #333;
    padding: 5px 10px;
    text-decoration: none;
    border-radius: 4px;
}

main {
    padding: 50px;
    text-align: center;
}

.upload-section {
    margin: 0 auto;
    max-width: 800px;
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

.upload-section h1 {
    margin-bottom: 20px;
}

.upload-box {
    margin: 20px 0;
}

.upload-box img {
    max-width: 200px;
    margin-bottom: 10px;
}

.upload-box .btn {
    padding: 10px 20px;
    background-color: #007bff;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.attendance-summary {
    margin-top: 20px;
}

textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-bottom: 10px;
}

.attendance-summary .btn {
    background-color: #28a745;
    padding: 10px 20px;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

footer {
    background-color: #333;
    color: #fff;
    padding: 30px;
    margin-top: 30px;
}

.footer-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1000px;
    margin: 0 auto;
}

.footer-container .contact, .footer-container .resources {
    margin-left: 20px;
}

.footer-container h4 {
    margin-bottom: 10px;
}

.footer-container p, .footer-container a {
    color: #fff;
    text-decoration: none;
}
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <h2>EduMailer</h2>
            <nav>
                <ul>
                    <li><a href="/upload">Upload Attendance data</a></li>
                    <li><a href="/display_data">Data</a></li>
                    <li><a href="/email">Emails</a></li>
                    <li><a href="/reports">Reports</a></li>
                </ul>
            </nav>
<!--            <a href="#" class="login-btn">Login</a>-->
        </div>
    </header>

</body>

</html>
